apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-profile
  namespace: mystic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-profile
  template:
    metadata:
      labels:
        app: postgres-profile
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "profiledb"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-profile
  namespace: mystic-platform
spec:
  selector:
    app: postgres-profile
  ports:
  - port: 5432
    targetPort: 5432
