name: PR Welcome

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add deploy instructions comment
        uses: actions/github-script@v7
        with:
          script: |
            const repoName = context.repo.repo;
            const branchName = context.payload.pull_request.head.ref;
            
            // Ссылка на workflow деплоя в этом же репозитории
            const deployUrl = `https://github.com/${context.repo.owner}/${repoName}/actions/workflows/deploy.yml?ref=${branchName}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
            ## 🚀 Deploy to Development
            
            ### Option 1: Click the button
            🔘 [**Deploy this PR to Dev**](${deployUrl})
            
            ### Option 2: Comment
            Just write \`/deploy\` in this PR.
            
            ---
            **What will happen:**
            - ✅ Build Docker image from PR code
            - ✅ Deploy to K3s dev environment
            - ✅ Update the deployment
            
            **Need to rollback?** Comment \`/rollback\`
            `
            });